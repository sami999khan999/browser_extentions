<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Sentence Copy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Shadcn UI Tokens */
      :root {
        --background: #ffffff;
        --foreground: #020817;
        --muted: #f8fafc;
        --muted-foreground: #61767c;
        --border: #e2e8f0;
        --primary: #7c3aed; /* Violet-600 */
        --radius: 4px;
        --recording: #ef4444; /* red-500 */
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #020817;
          --foreground: #f8fafc;
          --muted: #0f172a;
          --muted-foreground: #94a3b8;
          --border: #1e293b;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Manrope",
          -apple-system,
          system-ui,
          sans-serif;
        width: 340px;
        background-color: var(--background);
        color: var(--foreground);
        padding: 20px;
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
        line-height: 1.5;
      }

      body::-webkit-scrollbar {
        width: 4px;
      }
      body::-webkit-scrollbar-track {
        background: transparent;
      }
      body::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 4px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo {
        width: 32px;
        height: 32px;
        background-color: var(--primary);
        border-radius: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }
      .logo svg {
        width: 18px;
        height: 18px;
      }
      .brand h1 {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.0125em;
      }

      .section-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted-foreground);
        margin-bottom: 10px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        background-color: var(--background);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .card-info h2 {
        font-size: 14px;
        font-weight: 700;
      }
      .card-info p {
        font-size: 11px;
        color: var(--muted-foreground);
        margin-top: 1px;
      }

      input[type="number"] {
        width: 52px;
        background-color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 2px;
        color: var(--foreground);
        padding: 6px;
        text-align: center;
        font-family: inherit;
        font-weight: 700;
        font-size: 13px;
        outline: none;
        transition: all 0.2s;
      }

      .shortcut-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .shortcut-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background-color: var(--background);
        transition: all 0.2s;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }

      .shortcut-item:hover {
        background-color: var(--muted);
        border-color: rgba(124, 58, 237, 0.3);
      }

      .shortcut-item.recording {
        border-color: var(--recording);
        background-color: rgba(239, 68, 68, 0.05);
      }

      .shortcut-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--foreground);
      }
      .shortcut-keys {
        font-size: 10px;
        font-weight: 800;
        background-color: var(--muted);
        border: 1px solid var(--border);
        color: var(--primary);
        padding: 3px 8px;
        border-radius: 2px;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        pointer-events: none;
      }

      .shortcut-keys.active {
        color: var(--recording);
        border-color: var(--recording);
      }

      .btn-reset {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 12px;
        background-color: transparent;
        border: 1px solid var(--border);
        border-radius: 2px;
        color: var(--muted-foreground);
        font-size: 12px;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-reset:hover {
        background-color: var(--muted);
        color: var(--foreground);
      }

      .footer {
        margin-top: 12px;
        text-align: center;
        font-size: 11px;
        font-weight: 500;
        color: var(--muted-foreground);
        opacity: 0.6;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .recording-hint {
        font-size: 10px;
        color: var(--recording);
        font-weight: 700;
        display: none;
        text-align: center;
        padding: 4px;
      }

      #global-hint {
        display: none;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container fade-in">
      <header>
        <div class="header-left">
          <div class="logo">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
              ></path>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
            </svg>
          </div>
          <div class="brand"><h1>Quick Copy</h1></div>
        </div>
        <button
          id="resetDefaults"
          class="btn-reset"
          title="Reset to original shortcuts"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </svg>
          Reset
        </button>
      </header>

      <div>
        <h3 class="section-label">General Settings</h3>
        <div class="card">
          <div class="card-info">
            <h2>Phrase Range</h2>
            <p>N-words to capture</p>
          </div>
          <input type="number" id="wordCount" min="1" max="100" value="5" />
        </div>
      </div>

      <div>
        <h3 class="section-label">Dynamic Shortcuts</h3>
        <div class="shortcut-list">
          <div class="shortcut-item" data-action="sentence">
            <span class="shortcut-label">Full Sentence</span>
            <span class="shortcut-keys" id="key-sentence">CTRL + CLICK</span>
          </div>
          <div class="shortcut-item" data-action="word1">
            <span class="shortcut-label">Single Word</span>
            <span class="shortcut-keys" id="key-word1">CTRL + SHIFT</span>
          </div>
          <div class="shortcut-item" data-action="word2">
            <span class="shortcut-label">Two Word Pairing</span>
            <span class="shortcut-keys" id="key-word2">CTRL + ALT</span>
          </div>
          <div class="shortcut-item" data-action="wordN">
            <span class="shortcut-label">Dynamic Phrase</span>
            <span class="shortcut-keys" id="key-wordN">SHIFT + CLICK</span>
          </div>
        </div>
        <div id="global-hint" class="recording-hint">
          Press modifiers + Click outside to save
        </div>
      </div>

      <div class="footer">
        <span>Click any shortcut to remap &bull; v1.0</span>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
