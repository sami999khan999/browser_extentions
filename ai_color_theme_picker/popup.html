<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme AI</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="linear-theme">
    <div class="glow-bg"></div>
    <div class="app-shell">
        <header class="app-header">
            <div class="brand">
                <div class="logo-shield">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                </div>
                <div class="brand-text">
                    <h1>Theme AI</h1>
                    <div class="badge" style="margin-top:2px; width: fit-content">v1.0</div>
                </div>
            </div>
            <button id="reset-api" class="settings-trigger" title="Settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </header>

        <main id="app-viewport">
            <!-- View 1: Auth -->
            <section id="setup-view" class="view hidden">
                <div class="hero-section">
                    <h2>Connect Gemini</h2>
                    <p>Enter your API key to unlock AI theme generation.</p>
                </div>
                <div class="auth-box">
                    <div class="field">
                        <label for="api-key">API Key</label>
                        <input type="password" id="api-key" placeholder="Paste your key here...">
                    </div>
                    <button id="save-key" class="action-btn primary">
                        <span>Initialize</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                    </button>
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" class="helper-link">Get a free key →</a>
                </div>
            </section>

            <!-- View 2: Editor -->
            <section id="main-view" class="view hidden">
                <div class="editor-container">
                    <div class="editor-header">
                        <div>
                            <span class="label">Prompt </span> <span class="hint">(Optional)</span>
                        </div>
                        <span class="hint">Shift + Enter to generate</span>
                    </div>
                    <textarea id="user-prompt" placeholder="Modern SaaS dashboard with slate colors..."></textarea>
                    <button id="generate-btn" class="generate-trigger">
                        <div id="btn-content">
                            <span>Generate Theme</span>
                            <kbd>⌘G</kbd>
                        </div>
                        <div id="spinner" class="spinner hidden"></div>
                        <div id="arrow-icon" class="icon-wrapper">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                        </div>
                    </button>
                </div>
            </section>

            <!-- View 3: Success -->
            <section id="result-view" class="view hidden">
                <div class="success-banner">
                    <div class="check-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                    </div>
                    <h3>Theme Ready</h3>
                </div>

                <div class="grid-layout">
                    <button id="copy-light" class="format-card">
                        <div class="card-head">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                            <span>Light</span>
                        </div>
                        <code>OKLCH</code>
                    </button>
                    <button id="copy-dark" class="format-card">
                        <div class="card-head">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                            <span>Dark</span>
                        </div>
                        <code>OKLCH</code>
                    </button>
                </div>

                <button id="copy-full" class="full-export">
                    <span>Export Full CSS</span>
                </button>

                <button id="start-over" class="back-link">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    <span>New Generation</span>
                </button>
            </section>
        </main>

        <footer class="app-footer">
            <div id="error-display" class="error-strip hidden"></div>
            <div class="status-bar">
                <span class="status-dot"></span>
                <span id="system-status">System Ready</span>
            </div>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
